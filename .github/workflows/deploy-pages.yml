name: פרסום ל-GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: הורדת הקוד
        uses: actions/checkout@v4
      - name: התקנת Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: התקנת תלויות
        run: npm ci
      - name: בניית האתר הסטטי
        run: npm run build:pages
      - name: הגדרת Pages
        uses: actions/configure-pages@v5
      - name: הכנת קובצי האתר
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages
      - name: פרסום האתר
        id: deployment
        uses: actions/deploy-pages@v4
